<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AsistenteIA</title>
<link rel="stylesheet" href="panel.css">
<base target="_blank">
<base target="_blank">
<base target="_blank">
</head>
<body>
  <div id="panel">

    <!-- ORBE GRANDE -->
    <div id="orbe-wrap">
      <div id="orbe-circulo">
        <svg id="orbe-svg" viewBox="0 0 96 96">
          <!-- Círculo base -->
          <circle id="orbe-base" cx="48" cy="48" r="24"
                  fill="#10262c" stroke="#1c3a3f" stroke-width="2"/>

          <!-- === OJOS === -->
          <g id="ojos-abiertos">
            <!-- Pupila izquierda -->
            <circle id="pupila-izq" cx="39" cy="45" r="2.8" fill="#3a5a5c"/>
            <!-- Brillo del ojo izquierdo -->
            <circle id="brillo-izq" cx="40.2" cy="43.8" r="0.9" fill="rgba(255,255,255,0.35)" style="display:none"/>

            <!-- Pupila derecha -->
            <circle id="pupila-der" cx="57" cy="45" r="2.8" fill="#3a5a5c"/>
            <!-- Brillo del ojo derecho -->
            <circle id="brillo-der" cx="58.2" cy="43.8" r="0.9" fill="rgba(255,255,255,0.35)" style="display:none"/>
          </g>

          <!-- Ojos cerrados (parpadeo / dormido normal) -->
          <g id="ojos-cerrados" style="display:none">
            <line id="cerrado-izq" x1="35" y1="45" x2="43" y2="45"
                  stroke="#3a5a5c" stroke-width="2" stroke-linecap="round"/>
            <line id="cerrado-der" x1="53" y1="45" x2="61" y2="45"
                  stroke="#3a5a5c" stroke-width="2" stroke-linecap="round"/>
          </g>

          <!-- Ojos medio abiertos (para animación dormido: casi despierta) -->
          <g id="ojos-drowsy" style="display:none">
            <path id="drowsy-izq" d="M 35 45 Q 39 43 43 45"
                  fill="none" stroke="#8b9ae8" stroke-width="2" stroke-linecap="round"/>
            <path id="drowsy-der" d="M 53 45 Q 57 43 61 45"
                  fill="none" stroke="#8b9ae8" stroke-width="2" stroke-linecap="round"/>
          </g>

          <!-- Ojos espiral (mareo / dizzy) — ESPIRAL DE ARQUÍMEDES -->
          <g id="ojos-spiral" style="display:none">
            <!-- Ojo izquierdo: posición fija, espiral rota sobre su centro -->
            <g transform="translate(39, 45)">
              <g id="spiral-izq">
                <path d="M 0.40 0.00 L 0.58 0.22 L 0.63 0.55 L 0.50 0.92 L 0.17 1.25 L -0.33 1.44 L -0.93 1.41 L -1.54 1.12 L -2.05 0.56 L -2.33 -0.21 L -2.30 -1.11 L -1.91 -2.00 L -1.17 -2.74 L -0.14 -3.20 L 1.06 -3.25 L 2.26 -2.84 L 3.30 -1.97 L 4.00 -0.73 L 4.21 0.76 L 3.86 2.30 L 2.94 3.68 L 1.52 4.68"
                      fill="none" stroke="#3a5a5c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </g>
            </g>
            <!-- Ojo derecho: posición fija, espiral rota sobre su centro (dirección opuesta) -->
            <g transform="translate(57, 45)">
              <g id="spiral-der">
                <path d="M 0.40 -0.00 L 0.58 -0.22 L 0.63 -0.55 L 0.50 -0.92 L 0.17 -1.25 L -0.33 -1.44 L -0.93 -1.41 L -1.54 -1.12 L -2.05 -0.56 L -2.33 0.21 L -2.30 1.11 L -1.91 2.00 L -1.17 2.74 L -0.14 3.20 L 1.06 3.25 L 2.26 2.84 L 3.30 1.97 L 4.00 0.73 L 4.21 -0.76 L 3.86 -2.30 L 2.94 -3.68 L 1.52 -4.68"
                      fill="none" stroke="#3a5a5c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </g>
            </g>
          </g>

          <!-- === BOCA === -->
          <!-- Neutra (idle) - se anima via JS -->
          <path id="boca-neutra" d="M 44 55 Q 48 55 52 55"
                fill="none" stroke="#3a5a5c" stroke-width="2" stroke-linecap="round"/>

          <!-- Hablando - se anima via JS -->
          <path id="boca-hablando" d="M 42 53 Q 48 59 54 53"
                fill="none" stroke="#3a5a5c" stroke-width="2" stroke-linecap="round"
                style="display:none"/>

          <!-- Escuchando -->
          <circle id="boca-escuchando" cx="48" cy="55" r="3"
                  fill="#3a5a5c" style="display:none"/>

          <!-- Dormido -->
          <ellipse id="boca-dormido" cx="48" cy="55" rx="1.5" ry="1.5"
                   fill="#8b9ae8" style="display:none; opacity:0.5"/>

          <!-- Hover / sonrisa -->
          <path id="boca-sonrisa" d="M 42 55 Q 48 61 54 55"
                fill="none" stroke="#3a5a5c" stroke-width="2" stroke-linecap="round"
                style="display:none"/>

          <!-- Boca mareada (dizzy) — zigzag de mareo -->
          <path id="boca-dizzy" d="M 40 55 L 43 52 L 46 58 L 49 52 L 52 58 L 55 55"
                fill="none" stroke="#3a5a5c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                style="display:none"/>

          <!-- Z flotantes -->
          <g id="z-flotantes" style="display:none">
            <text id="z1" x="64" y="30" font-family="Segoe UI, sans-serif" font-size="8"
                  font-weight="bold" fill="#8b9ae8" text-anchor="middle" opacity="0">z</text>
            <text id="z2" x="72" y="24" font-family="Segoe UI, sans-serif" font-size="10"
                  font-weight="bold" fill="#8b9ae8" text-anchor="middle" opacity="0">z</text>
          </g>

          <!-- Indicador de no molestar -->
          <g id="dnd-indicador" style="display:none">
            <circle cx="69" cy="27" r="8" fill="#ff5566" stroke="#0b1a1f" stroke-width="2"/>
            <line x1="65" y1="27" x2="73" y2="27" stroke="#0b1a1f" stroke-width="3" stroke-linecap="round"/>
          </g>
        </svg>
      </div>

      <div id="orbe-estado-texto">Inactivo</div>
      <div id="orbe-sub">— · jarvis</div>
    </div>

    <!-- HEADER -->
    <div id="header">
      <div id="mini-orbe" onclick="pywebview.api.colapsar()">
        <svg viewBox="0 0 24 24">
          <circle class="ojo" id="mini-ojo-izq" cx="7"  cy="11" r="1.6"/>
          <circle class="ojo" id="mini-ojo-der" cx="15" cy="11" r="1.6"/>
          <path class="boca" id="mini-boca" d="M 8 17 Q 11 19 14 17"/>
        </svg>
      </div>
      <div id="header-textos">
        <div id="header-modo">Inactivo</div>
        <div id="header-sub">— · jarvis</div>
      </div>
      <div id="header-motor">Groq</div>
      <button onclick="pywebview.api.minimizar()">–</button>
      <button onclick="pywebview.api.cerrar_app()">×</button>
    </div>

    <!-- MÉTRICAS -->
    <div id="metricas">
      <div class="metrica"><div class="lbl">wake word</div><div class="val" id="m-wake">jarvis</div></div>
      <div class="metrica"><div class="lbl">motor</div><div class="val" id="m-motor">Groq</div></div>
      <div class="metrica"><div class="lbl">no molestar</div><div class="val" id="m-dnd">off</div></div>
    </div>

    <!-- CATEGORÍAS -->
    <div id="categorias"></div>

    <!-- HISTORIAL -->
    <div id="historial-wrap">
      <div id="historial-titulo">Historial</div>
      <div id="historial-lista"><div class="hist-vacio">Todavía no hay comandos.<br>Decí "jarvis" para empezar.</div></div>
    </div>

    <!-- OVERLAY + PANEL FLOTANTE -->
    <div id="overlay" onclick="cerrarFlotante()"></div>
    <div id="flotante">
      <div id="flotante-header">
        <div id="flotante-titulo">—</div>
        <button id="flotante-cerrar" onclick="cerrarFlotante()">×</button>
      </div>
      <div class="flotante-lista" id="flotante-lista"></div>
    </div>

  </div>
  <script src="panel.js"></script>
</body>
</html>
